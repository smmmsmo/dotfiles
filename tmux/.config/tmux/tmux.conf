# -----------------------------------------------------------------------------
# tmux.conf (Omarchy-style, annotated)
# Main file: ~/.config/tmux/tmux.conf
# Reload: prefix + q
# -----------------------------------------------------------------------------

# Quick key map
# - Prefix keys: Ctrl-Space (primary), Ctrl-b (secondary)
# - Split pane:  prefix + h (horizontal split), prefix + v (vertical split)
# - Rename:      prefix + r (window), prefix + R (session)
# - New/Kill:    prefix + c / k (window), prefix + C / K (session)
# - Status hint: top-right shows PREFIX while prefix is active


# -----------------------------------------------------------------------------
# Prefix keys
# -----------------------------------------------------------------------------
set -g prefix C-Space
set -g prefix2 C-b
bind C-Space send-prefix


# -----------------------------------------------------------------------------
# Reload
# -----------------------------------------------------------------------------
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"


# -----------------------------------------------------------------------------
# Copy mode (vi)
# -----------------------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel


# -----------------------------------------------------------------------------
# Pane controls
# -----------------------------------------------------------------------------
# Split in current directory so panes stay project-local.
bind h split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind x kill-pane

# No-prefix pane movement (Ctrl+Alt+Arrows)
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D

# No-prefix pane resize (Ctrl+Alt+Shift+Arrows)
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5


# -----------------------------------------------------------------------------
# Window controls
# -----------------------------------------------------------------------------
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind c new-window -c "#{pane_current_path}"
bind k kill-window

# No-prefix direct window jumps (Alt+1..9)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# No-prefix cycling and reordering
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1


# -----------------------------------------------------------------------------
# Session controls
# -----------------------------------------------------------------------------
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session
bind P switch-client -p
bind N switch-client -n

# No-prefix session cycling
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n


# -----------------------------------------------------------------------------
# General behavior
# -----------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off


# -----------------------------------------------------------------------------
# Status bar and naming
# -----------------------------------------------------------------------------
set -g status-position top
set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'


# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "

# Indicator tokens (top-right):
# - COPY   when copy-mode is active
# - PREFIX while tmux is waiting after prefix key
# - ZOOM   when pane is zoomed
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "

set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue


# -----------------------------------------------------------------------------
# TPM plugins (requested additions)
# -----------------------------------------------------------------------------
# Plugin manager path (XDG style)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins'

# TPM + plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Session persistence
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Clipboard integration
set -g @yank_selection 'clipboard'

# Auto-bootstrap TPM on a fresh machine.
if "test ! -d ~/.config/tmux/plugins/tpm" "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm'"

# Initialize TPM (must stay at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
