# ══════════════════════════════════════════════════════════════════
# tmux.conf — main config, Tokyo Night, Neovim-friendly
# ══════════════════════════════════════════════════════════════════
#
# Main file:   ~/.config/tmux/tmux.conf
# Prefix:      Ctrl+Space
# Pane nav:    Ctrl+h/j/k/l  (no prefix — seamless with Neovim via vim-tmux-navigator)
# Pane resize: prefix + H/J/K/L
# Last pane:   prefix + ;
# Splits:      prefix + |  (vertical)    prefix + -  (horizontal)
# New window:  prefix + c  (inherits cwd)
# Reload:      prefix + ,
# Copy mode:   prefix + v  (then v to select, y to yank)
# Popup shell: prefix + g  (persistent scratch session)
# Rename win:  prefix + r
# Rename ses:  prefix + S
# Sync panes:  prefix + P  (broadcast same input to all panes)
# Last window: prefix + Tab
# Sessions:    Alt+Up / Alt+Down (no prefix)
# Windows:     Alt+1..9 (no prefix)
#
# Plugins managed by TPM. On a fresh machine just start tmux —
# TPM auto-bootstraps, then press prefix + I to install plugins.
#
# ══════════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────────
#  GENERAL
# ──────────────────────────────────────────────────────────────────

# -- Prefix: Ctrl+Space --
# Ctrl+b is the tmux default, but many people find it awkward.
# Ctrl+Space is easy to hit and avoids conflicts with Ctrl+a in shells.
#
# If your terminal does not pass Ctrl+Space cleanly, switch to:
#   set -g prefix C-a
#   bind C-a send-prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# -- True color (24-bit) --
# tmux-256color tells programs inside tmux they have 256-color support.
# The terminal-overrides line tells tmux that the OUTER terminal
# (Ghostty, iTerm2, etc.) supports 24-bit RGB color sequences.
# Without both, Neovim themes like Tokyo Night look washed out.
set -g default-terminal "tmux-256color"
# tmux 3.2+ preferred form: advertise the feature rather than patching terminfo.
set -as terminal-features ",*:RGB"

# -- Undercurl support --
# Ghostty and Kitty support styled underlines (curly, dotted, dashed).
# Neovim uses undercurl for LSP diagnostics (errors, warnings).
set -as terminal-features ",*:usstyle"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# -- Escape time --
# Time (ms) tmux waits after Escape to see if it's part of a longer
# sequence. Default 500ms makes Neovim mode switching feel sluggish.
# 10ms catches real sequences without adding perceptible lag.
set -sg escape-time 10

# -- Repeat time --
# Window (ms) after pressing prefix where tmux accepts repeat keys
# without needing prefix again. Comfortable for repeated H/J/K/L resizes.
set -g repeat-time 600

# -- History --
# Lines of scrollback per pane. Use prefix+[ to scroll up.
set -g history-limit 50000

# -- Indexing --
# Start at 1 so window 1 maps to the 1 key, not window 0.
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# -- Mouse --
# Click to select panes/windows, drag to resize, scroll to enter copy mode.
set -g mouse on

# -- Focus events --
# Pass focus-in/focus-out to programs inside tmux.
# Neovim uses these to trigger autoread and dim/brighten on focus change.
set -g focus-events on

# -- Window size --
# Resize based on the smallest CLIENT viewing this window, not the
# smallest client attached to the session. Prevents a small laptop
# screen from shrinking all windows when a bigger monitor is also attached.
# (aggressive-resize was deprecated in tmux 3.3; window-size supersedes it.)
set -g window-size largest

# -- Window titles --
# Keeps the terminal title bar in sync with the active tmux context.
set -g set-titles on
set -g set-titles-string "#S / #W"

# -- Display time --
# How long (ms) status messages and pane-number overlays stay visible.
set -g display-time 2000
set -g display-panes-time 2000

# -- Detach on destroy --
# Without this, killing the last session exits tmux entirely.
# With it, tmux switches to the next available session instead.
set -g detach-on-destroy off

# -- Allow passthrough --
# Required for inline image protocols (Ghostty, Kitty) and Neovim plugins
# like image.nvim. Without this, images are silently swallowed by tmux.
# Using "on" (active pane only) rather than "all" to limit the surface area
# for escape-sequence injection when SSH'd into untrusted hosts.
set -g allow-passthrough on

# -- OSC 52 clipboard passthrough --
# Lets programs inside tmux write to the system clipboard directly
# via OSC 52 escape sequences, without routing through tmux-yank.
set -s set-clipboard on

# -- Vi keys in the command prompt --
# mode-keys vi covers copy mode. status-keys vi covers the tmux
# command prompt (the : bar at the bottom when typing tmux commands).
set -g status-keys vi

# -- Window activity monitoring --
# Highlight background windows that produce output you haven't seen.
# visual-activity off suppresses the noisy "Activity in window X" message
# while still applying the colour style to the window tab.
setw -g monitor-activity on
set -g visual-activity off


# ──────────────────────────────────────────────────────────────────
#  KEY BINDINGS
# ──────────────────────────────────────────────────────────────────

# -- Reload config --
bind , source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# -- Splits --
# | and - are visual mnemonics for the divider they create.
# Both open in the current pane's working directory.
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Backslash alias for | so you don't need Shift
bind \\ split-window -h -c "#{pane_current_path}"

# -- New window in current directory --
bind c new-window -c "#{pane_current_path}"

# -- Pane navigation (vim-tmux-navigator, no prefix) --
# Ctrl+h/j/k/l moves between tmux panes AND Neovim splits transparently.
# vim-tmux-navigator detects whether the focused pane is running Neovim
# and routes the keypress there if so, or switches tmux panes otherwise.
# Requires the matching plugin on the Neovim side:
#   https://github.com/christoomey/vim-tmux-navigator
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# -- Last pane (prefix + ;) --
# Mirrors Tab for last window — quick toggle between two panes in a split.
bind \; last-pane

# -- Pane resizing (vim-style, repeatable) --
# -r allows repeated presses within repeat-time without re-pressing prefix.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# -- Swap panes --
# < and > reorder panes within the current window layout.
bind -r < swap-pane -U
bind -r > swap-pane -D

# -- Window navigation --
# prefix + n / p cycle windows with repeat support.
# Note: M-[ / M-] no-prefix bindings removed — M-[ is part of ANSI escape
# sequences and conflicts with apps (Neovim, fzf) inside panes.
bind -r n next-window
bind -r p previous-window

# -- Direct window jumps without prefix (Alt+1..9) --
# Jump straight to any window with one keypress. Fastest way to switch
# when you know which window you want.
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# -- Toggle to last used window --
# Quick back-and-forth between two windows without remembering numbers.
bind Tab last-window

# -- Kill pane with confirmation --
# Prevents fat-fingering x and losing a running process.
bind x confirm-before -p "Kill pane? (y/n)" kill-pane

# -- Synchronize panes --
# Broadcast the same keystrokes to all panes in the current window.
# Ideal for running the same command on multiple servers simultaneously.
# The display-message shows current state so you know if it's on or off.
bind P setw synchronize-panes \; display-message "Sync panes: #{?pane_synchronized,ON — type in all panes,OFF — back to normal}"

# -- Remain on exit --
# `failed` keeps panes open only when a command exits non-zero, so crashes
# stick around for inspection while successful exits close cleanly.
# Press prefix + e to respawn (restart) the pane's command after inspecting.
set -g remain-on-exit failed
bind e respawn-pane -k

# -- Popup / scratch terminal overlay --
# Floating terminal over your current layout. Opens in the current pane's
# directory. Ideal for quick git commands or file checks without splitting.
# -A attaches to existing scratch session if one already exists.
bind g display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "tmux new-session -A -s scratch"

# -- Rename window and session --
# Pre-fills the prompt with the current name so you only edit the diff.
bind r command-prompt -I "#W" "rename-window '%%'"
bind S command-prompt -I "#S" "rename-session '%%'"

# -- Session management --
# s opens the full session/window tree with preview.
# Alt+Up / Alt+Down cycle sessions without prefix — critical when SSH'd
# into multiple machines or running many projects simultaneously.
bind s choose-tree -Zs
bind -n M-Up   switch-client -p
bind -n M-Down switch-client -n

# -- Break and join panes --
# b promotes the current pane to its own window.
# B pulls a pane from another window into this one as a vertical split.
bind b break-pane
bind B choose-window "join-pane -h -s '%%'"

# -- New session in current working directory --
bind C new-session -c "#{pane_current_path}"

# -- Kill the current session (with confirmation) --
# Useful when you want to clean up without switching away first.
bind X confirm-before -p "Kill session #S? (y/n)" kill-session

# -- Toggle pipe-pane logging --
# Appends everything written to the active pane into ~/tmux-<window>.log.
# Press again to stop. Invaluable for capturing test runs or server logs.
bind * if-shell -F '#{pane_pipe}' \
  'pipe-pane ; display "Logging stopped"' \
  'pipe-pane -o "cat >> #{HOME}/tmux-#W.log" ; display "Logging to ~/tmux-#W.log"'


# ──────────────────────────────────────────────────────────────────
#  COPY MODE (vi-style)
# ──────────────────────────────────────────────────────────────────

# Use vi keys in copy mode (hjkl to move, / to search, etc.)
set -g mode-keys vi

# Enter copy mode with prefix+v (mnemonic: visual mode in vim).
# Default prefix+[ still works too.
bind v copy-mode

# Selection and yank — mirrors vim visual mode workflow.
#   v     = start character selection
#   C-v   = toggle rectangle / block selection
#   y     = yank and exit copy mode
#   Enter = yank and exit copy mode (muscle memory from vim)
bind -T copy-mode-vi v     send-keys -X begin-selection
bind -T copy-mode-vi C-v   send-keys -X rectangle-toggle
bind -T copy-mode-vi y     send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# Scroll bindings matching vim motion conventions.
#   C-u / C-d = half-page up / down
#   g / G     = jump to top / bottom of scrollback history
bind -T copy-mode-vi C-u send-keys -X halfpage-up
bind -T copy-mode-vi C-d send-keys -X halfpage-down
bind -T copy-mode-vi g   send-keys -X history-top
bind -T copy-mode-vi G   send-keys -X history-bottom

# Mouse drag copies selection to clipboard and exits copy mode.
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Vim-like incremental search in copy mode.
# Results highlight as you type, matching vim's incsearch feel.
bind -T copy-mode-vi / command-prompt -i -p "search down" "send -X search-forward-incremental \"%%%\""
bind -T copy-mode-vi ? command-prompt -i -p "search up"   "send -X search-backward-incremental \"%%%\""


# ──────────────────────────────────────────────────────────────────
#  STATUS BAR — Tokyo Night
# ──────────────────────────────────────────────────────────────────
#
#  Color palette (from Tokyo Night Storm):
#    bg_dark    #1a1b26    main background
#    bg         #24283b    lighter background
#    bg_hl      #292e42    highlight background
#    fg         #c0caf5    main foreground
#    fg_dark    #a9b1d6    dimmed foreground
#    fg_gutter  #3b4261    gutter / inactive text
#    blue       #7aa2f7    primary accent
#    purple     #bb9af7    secondary accent
#    green      #9ece6a    success / ZOOM indicator
#    red        #f7768e    error / PREFIX indicator
#    yellow     #e0af68    warning / COPY indicator / activity
#    cyan       #7dcfff    info / highlights
#    teal       #73daca    alternative accent
#
# ──────────────────────────────────────────────────────────────────

set -g status-position top
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

# -- Left: session name --
set -g status-left-length 40
set -g status-left '#[fg=#7aa2f7] #S  '

# -- Right: PREFIX / COPY / ZOOM state indicators --
# PREFIX = Ctrl+Space pressed; tmux is waiting for the next key
# COPY   = you are in copy mode right now
# ZOOM   = the active pane is zoomed (filling the window)
set -g status-right-length 60
set -g status-right "#{?client_prefix,#[fg=#f7768e] PREFIX ,}#{?pane_in_mode,#[fg=#e0af68] COPY ,}#{?window_zoomed_flag,#[fg=#9ece6a] ZOOM ,}#{?pane_synchronized,#[fg=#bb9af7] SYNC ,}#[fg=#3b4261]│ #[fg=#a9b1d6]%H:%M"

# -- Window list --
# Inactive: dimmed index + name.
# Active:   blue accent background, bold.
set -g window-status-format         "#[fg=#3b4261,bg=#1a1b26] #I #[fg=#a9b1d6]#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7]  #I #W #[fg=#7aa2f7,bg=#1a1b26]"
set -g window-status-separator      ""

# Highlight windows with unread activity (yellow) or bell (red).
set -g window-status-activity-style "fg=#e0af68,bold"
set -g window-status-bell-style     "fg=#f7768e,bold"

# -- Pane borders --
set -g pane-border-style        "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# -- Pane border status line --
# Shows the pane index and the currently running command above each pane.
# Invaluable when you have many panes and need to know what's running where.
set -g pane-border-status top
set -g pane-border-format " #[bold]#P #[default]#{pane_current_command} "

# -- Message / command prompt --
set -g message-style         "fg=#c0caf5,bg=#292e42,bold"
set -g message-command-style "fg=#c0caf5,bg=#292e42"

# -- Copy mode highlight --
set -g mode-style "fg=#7aa2f7,bg=#292e42,bold"

# -- Clock mode (prefix + t) --
set -g clock-mode-colour "#7aa2f7"
set -g clock-mode-style 24

# -- Pane number display (prefix + q) --
set -g display-panes-active-colour "#7aa2f7"
set -g display-panes-colour        "#3b4261"


# ──────────────────────────────────────────────────────────────────
#  PLUGINS (via TPM)
# ──────────────────────────────────────────────────────────────────
#
#  Install:   prefix + I
#  Update:    prefix + U
#  Uninstall: prefix + Alt+u
#
# ──────────────────────────────────────────────────────────────────

# $HOME expands correctly; single-quoted ~ does not expand in tmux.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins"

# TPM — plugin manager (must be listed first)
set -g @plugin 'tmux-plugins/tpm'

# resurrect — save and restore sessions across restarts and reboots.
#   prefix + Ctrl+s  = save
#   prefix + Ctrl+r  = restore
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# continuum — auto-saves every 15 min and restores on tmux start.
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# yank — system clipboard integration.
# Auto-detects pbcopy (macOS) and xclip/xsel (Linux). Zero config needed.
# NOTE: option name uses underscore, not hyphen — hyphen is silently ignored.
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection 'clipboard'

# vim-tmux-navigator — seamless Ctrl+h/j/k/l navigation between tmux panes
# and Neovim splits. Must also install the matching Neovim plugin:
#   vim:  Plugin 'christoomey/vim-tmux-navigator'
#   lazy: { 'christoomey/vim-tmux-navigator' }
set -g @plugin 'christoomey/vim-tmux-navigator'

# sessionx — fzf-powered floating session/window picker.
# Press prefix + O to open. Faster than choose-tree for many sessions.
# Preview shows window contents. Supports fuzzy search and session creation.
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'O'

# open — in copy mode, highlight any path or URL and press o to open it.
# Uses open (macOS) or xdg-open (Linux) automatically.
set -g @plugin 'tmux-plugins/tmux-open'

# fzf-url — press prefix + u to fuzzy-pick any URL visible in the pane
# and open it in your browser. Works on macOS and Linux.
set -g @plugin 'wfxr/tmux-fzf-url'

# thumbs — vimium-style hints over any path / hash / URL / IP visible
# in the pane. Press prefix + space, then the two-letter hint to copy.
# prefix + shift+space does the same but also opens the match.
#   brew install tmux-thumbs   (or builds via cargo on first use)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key space
set -g @thumbs-command    'printf "%s" {} | pbcopy'
set -g @thumbs-upcase-command 'printf "%s" {} | pbcopy && open "{}"'

# extrakto — prefix + Tab opens fzf over everything visible in the pane
# (words, paths, URLs, git hashes, quoted strings). Selected match is
# copied to clipboard or inserted at the prompt.
set -g @plugin 'laktak/extrakto'
set -g @extrakto_key 'Tab'
set -g @extrakto_clip_tool 'pbcopy'
set -g @extrakto_split_direction 'p'   # popup window


# ── Mac vs Linux clipboard note ────────────────────────────────────
# tmux-yank handles pbcopy/xclip/xsel detection automatically.
# On older macOS setups where clipboard breaks inside tmux, install:
#   brew install reattach-to-user-namespace
# then uncomment the two lines below:
#
# if-shell "uname | grep -q Darwin" \
#   "set -g default-command 'reattach-to-user-namespace -l $SHELL'" ""
#
# Modern Ghostty on macOS does not require this workaround.
# ──────────────────────────────────────────────────────────────────


# ──────────────────────────────────────────────────────────────────
#  TPM BOOTSTRAP
# ──────────────────────────────────────────────────────────────────
# Clones TPM automatically on a fresh machine so you only need to
# start tmux and press prefix + I — no manual git clone required.

if "test ! -d $HOME/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm $HOME/.config/tmux/plugins/tpm'"

# Initialize TPM — MUST stay at the very bottom of this file.
run "$HOME/.config/tmux/plugins/tpm/tpm"