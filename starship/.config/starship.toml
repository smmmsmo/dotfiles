# Starship — minimal, modern, professional
# Docs: https://starship.rs/config
"$schema" = 'https://starship.rs/config-schema.json'

format = """\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$python\
$nodejs\
$docker_context\
$fill\
$cmd_duration\
$line_break\
$character"""

add_newline = true
command_timeout = 1000

# ── Username ─────────────────────────────────────────────────────
# Hidden on local sessions. Only appears when you're root or on SSH,
# so you always know when you're in a privileged/remote context.
[username]
format      = "[$user]($style)"
style_user  = "bold cyan"
style_root  = "bold red"
show_always = false

# ── Hostname ─────────────────────────────────────────────────────
# Only shows over SSH. When you're on one of your Linux machines
# remotely, you'll see user@hostname so you never run commands on
# the wrong box.
[hostname]
ssh_only = true
format   = "[@$hostname]($style) "
style    = "bold yellow"

# ── Directory ────────────────────────────────────────────────────
[directory]
format            = "[$path]($style)[$read_only]($read_only_style) "
style             = "bold cyan"
read_only         = " "
read_only_style   = "red"
truncation_length = 3
truncate_to_repo  = true
home_symbol       = "~"

[directory.substitutions]
"GITHUB"    = " "
"Documents" = "󰈙 "
"Downloads" = " "
"Projects"  = "󰲋 "

# ── Fill ─────────────────────────────────────────────────────────
# Invisible spacer that pushes cmd_duration to the right edge of
# the terminal. Keeps the left side clean and consistent width.
[fill]
symbol = " "

# ── Git ──────────────────────────────────────────────────────────
[git_branch]
symbol    = " "
format    = "[$symbol$branch]($style) "
style     = "bold purple"
truncation_length = 24
truncation_symbol = "..."

[git_status]
format     = "[$all_status$ahead_behind]($style) "
style      = "bold yellow"
ahead      = "[+${count}](bold green)"
behind     = "[-${count}](bold red)"
diverged   = "[+${ahead_count} -${behind_count}](bold yellow)"
conflicted = "[~${count}](bold red)"
untracked  = "[?${count}](dimmed)"
modified   = "[!${count}](bold yellow)"
staged     = "[+${count}](bold green)"
deleted    = "[x${count}](bold red)"
renamed    = "[>${count}](bold blue)"
stashed    = "[*${count}](bold cyan)"
up_to_date = ""

# ── Languages (only what you use) ───────────────────────────────
[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style  = "green"
detect_files = ["package.json", ".node-version"]

[python]
symbol = " "
format = "[$symbol$version( $virtualenv)]($style) "
style  = "yellow"

# ── Docker (only when relevant) ──────────────────────────────────
[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style  = "blue"
only_with_files = true

# ── Command duration ─────────────────────────────────────────────
# Right-aligned via fill. Only shows for commands taking 3s+.
[cmd_duration]
min_time  = 3000
format    = "[$duration]($style)"
style     = "dimmed yellow"

# ── Prompt character ─────────────────────────────────────────────
[character]
success_symbol = "[>](bold green)"
error_symbol   = "[>](bold red)"
vimcmd_symbol  = "[<](bold yellow)"

# ── Disabled modules ─────────────────────────────────────────────
[os]
disabled = true

[git_metrics]
disabled = true

[memory_usage]
disabled = true

[time]
disabled = true

[package]
disabled = true

[conda]
disabled = true

[rust]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[php]
disabled = true

[ruby]
disabled = true

[swift]
disabled = true

[kotlin]
disabled = true
