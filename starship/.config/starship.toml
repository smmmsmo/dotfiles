"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 750
scan_timeout = 30
continuation_prompt = "[âˆ™](fg:muted) "
palette = "midnight_horizon"

format = """
[â•­â”€](bold fg:surface2)$hostname$directory$git_branch$git_state$git_status$fill$cmd_duration$time
[â•°â”€](bold fg:surface2)$python$nodejs$golang$rust$package$docker_context$kubernetes$jobs$status$character"""

[palettes.midnight_horizon]
muted = "#7f8ea3"
surface2 = "#44506a"
blue = "#82aaff"
teal = "#86e1fc"
green = "#c3e88d"
amber = "#ffc777"
peach = "#ff966c"
red = "#ff757f"
lavender = "#c099ff"

[fill]
symbol = " "

[hostname]
ssh_only = true
style = "fg:peach"
format = "[@$hostname]($style) "

[directory]
style = "bold fg:blue"
read_only = " َ°Œ¾"
read_only_style = "fg:amber"
truncation_length = 3
truncate_to_repo = true
truncation_symbol = "â€¦/"
home_symbol = "~"
format = "[َ°‰‹ $path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "َ°ˆ™ "
"Downloads" = "ï€™ "
"Music" = "َ°‌ڑ "
"Pictures" = "ï€¾ "
"Desktop" = "ï„ˆ "
"Projects" = "î—» "
"GITHUB" = "ï‚› "

[git_branch]
symbol = "ïگک "
style = "fg:lavender"
format = "[$symbol$branch]($style) "
truncation_length = 32
truncation_symbol = "â€¦"

[git_state]
style = "bold fg:peach"
format = '([$state( $progress_current/$progress_total)]($style) )'

[git_status]
style = "fg:amber"
format = "([$all_status$ahead_behind]($style) )"
ahead = "â‡،${count} "
behind = "â‡£${count} "
diverged = "â‡•â‡،${ahead_count}â‡£${behind_count} "
conflicted = "~${count} "
untracked = "?${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "آ»${count} "
deleted = "âœک${count} "
stashed = "*${count} "
up_to_date = ""

[cmd_duration]
min_time = 750
show_milliseconds = false
style = "fg:muted"
format = "[َ±ژ« $duration]($style) "

[time]
disabled = false
time_format = "%I:%M %p"
style = "fg:teal"
format = "[َ°¥” $time]($style)"

[python]
symbol = "îک† "
style = "fg:green"
format = '[${symbol}${pyenv_prefix}${version}( \($virtualenv\))]($style) '

[nodejs]
symbol = "îœک "
style = "fg:green"
format = "[$symbol$version]($style) "

[golang]
symbol = "îک§ "
style = "fg:green"
format = "[$symbol$version]($style) "

[rust]
symbol = "î‍¨ "
style = "fg:green"
format = "[$symbol$version]($style) "

[package]
symbol = "َ°ڈ— "
style = "fg:amber"
format = "[$symbol$version]($style) "

[docker_context]
symbol = "ïŒˆ "
style = "fg:blue"
format = "[${symbol}${context}]($style) "

[kubernetes]
symbol = "َ±ƒ¾ "
style = "fg:teal"
format = '[${symbol}${context}( \($namespace\))]($style) '

[jobs]
symbol = "âœ¦ "
number_threshold = 1
style = "fg:muted"
format = "[$symbol$number]($style) "

[status]
disabled = false
symbol = "âœک "
style = "bold fg:red"
format = "[$symbol$status]($style) "

[character]
success_symbol = "[â‌¯](bold fg:green)"
error_symbol = "[â‌¯](bold fg:red)"
