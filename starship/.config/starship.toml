# ╔══════════════════════════════════════════════════════════════╗
# ║              Starship — Pro Feature-Rich Config              ║
# ╚══════════════════════════════════════════════════════════════╝
# Requires a Nerd Font (e.g. JetBrainsMono Nerd Font, MesloLGS NF)

"$schema" = 'https://starship.rs/config-schema.json'

# ── Prompt layout ────────────────────────────────────────────────
format = """
[╭─](bold dimmed white)\
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$git_state\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$php\
$ruby\
$swift\
$kotlin\
$docker_context\
$package\
$conda\
$memory_usage\
$time\
$line_break\
[╰─](bold dimmed white)\
$character"""

right_format = ""

add_newline = true
command_timeout = 1000

# ── OS icon ──────────────────────────────────────────────────────
[os]
disabled = false
format = "[$symbol](bold blue) "

[os.symbols]
Macos    = "󰀵 "
Linux    = " "
Windows  = "󰍲 "
Ubuntu   = " "
Arch     = " "
Debian   = " "
Fedora   = " "
Alpine   = " "
Unknown  = " "

# ── Username ─────────────────────────────────────────────────────
[username]
style_user   = "bold cyan"
style_root   = "bold red"
format       = "[$user]($style)"
disabled     = false
show_always  = false        # only shows when SSH/root

# ── Hostname ─────────────────────────────────────────────────────
[hostname]
ssh_only   = true
format     = "[@$hostname](bold yellow) "
disabled   = false

# ── Directory ────────────────────────────────────────────────────
[directory]
format            = "[ $path]($style)[$read_only]($read_only_style) "
style             = "bold cyan"
read_only         = " 󰌾"
read_only_style   = "red"
truncation_length = 4
truncate_to_repo  = true
home_symbol       = "~"
use_logical_path  = true

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Desktop"   = "󰚝 "
"Projects"  = "󰲋 "
"GITHUB"    = " "

# ── Fill (spacer between left and right segments) ─────────────────
[fill]
symbol = " "

# ── Git ──────────────────────────────────────────────────────────
[git_branch]
symbol    = " "
format    = "[$symbol$branch(:$remote_branch)]($style) "
style     = "bold purple"
truncation_length = 20
truncation_symbol = "…"

[git_status]
format      = "([$all_status$ahead_behind]($style) )"
style       = "bold yellow"
conflicted  = "⚡"
ahead       = "⇡${count}"
behind      = "⇣${count}"
diverged    = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date  = "✓"
untracked   = "?${count}"
stashed     = " "
modified    = "!${count}"
staged      = "+${count}"
renamed     = "»${count}"
deleted     = "✘${count}"

[git_state]
format = '[\\($state( $progress_current of $progress_total)\\)]($style) '
style  = "bold yellow"

[git_metrics]
added_style   = "bold green"
deleted_style = "bold red"
format        = "[+$added]($added_style)/[-$deleted]($deleted_style) "
disabled      = false

# ── Languages & Runtimes ─────────────────────────────────────────
[nodejs]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold green"

[python]
symbol         = " "
format         = "[$symbol$version( \\($virtualenv\\))]($style) "
style          = "bold yellow"
pyenv_version_name = true

[rust]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold red"

[golang]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold cyan"

[java]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold red"

[php]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold purple"

[ruby]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold red"

[swift]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold orange"

[kotlin]
symbol = " "
format = "[$symbol$version]($style) "
style  = "bold blue"

# ── Docker ───────────────────────────────────────────────────────
[docker_context]
symbol = " "
format = "[$symbol$context]($style) "
style  = "bold blue"
only_with_files = true

# ── Package version ──────────────────────────────────────────────
[package]
symbol = "󰏗 "
format = "[$symbol$version]($style) "
style  = "bold 208"

# ── Conda ────────────────────────────────────────────────────────
[conda]
symbol = " "
format = "[$symbol$environment]($style) "
style  = "bold green"
ignore_base = false

# ── Memory usage ─────────────────────────────────────────────────
[memory_usage]
disabled  = false
threshold = 75
symbol    = "󰍛 "
format    = "[$symbol${ram_pct}]($style) "
style     = "bold dimmed red"

# ── Time ─────────────────────────────────────────────────────────
[time]
disabled    = false
format      = "[ $time]($style)"
time_format = "%H:%M"
style       = "bold dimmed white"
use_12hr    = false

# ── Command duration ─────────────────────────────────────────────
[cmd_duration]
min_time           = 2_000
format             = "[ $duration]($style) "
style              = "bold yellow"
show_milliseconds  = false

# ── Prompt character ─────────────────────────────────────────────
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold yellow)"
