"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 1500
scan_timeout = 30
continuation_prompt = "[∙](fg:muted) "
palette = "midnight_horizon"

# ── Line 1: context (left) + info (right via fill) ────────────────────────────
format = """
[╭─](bold fg:surface2)$sudo$username$hostname$directory$git_branch$git_commit$git_state$git_status$fill$cmd_duration$time
[╰─](bold fg:surface2)$docker_context$kubernetes$terraform$aws$gcloud$jobs$status$character"""

# ── Right side: language runtimes (keeps line 2 clean) ────────────────────────
right_format = """$os$python$nodejs$golang$rust$java$lua$ruby$package$direnv$battery"""

# ── Palette ───────────────────────────────────────────────────────────────────
[palettes.midnight_horizon]
muted    = "#7f8ea3"
surface2 = "#44506a"
blue     = "#82aaff"
teal     = "#86e1fc"
green    = "#c3e88d"
amber    = "#ffc777"
peach    = "#ff966c"
red      = "#ff757f"
lavender = "#c099ff"

# ── Layout helpers ────────────────────────────────────────────────────────────
[fill]
symbol = " "

# ── Identity ──────────────────────────────────────────────────────────────────
[username]
show_always   = false          # only shows for root or over SSH
style_user    = "fg:peach"
style_root    = "bold fg:red"
format        = "[$user]($style) "

[hostname]
ssh_only = true
style    = "fg:peach"
format   = "[@$hostname]($style) "

[sudo]
disabled = false
symbol   = "󰌾 "
style    = "bold fg:red"
format   = "[$symbol]($style)"

# ── Navigation ────────────────────────────────────────────────────────────────
[directory]
style              = "bold fg:blue"
read_only          = " 󰌾"
read_only_style    = "fg:amber"
truncation_length  = 3
truncate_to_repo   = true
truncation_symbol  = "…/"
home_symbol        = "~"
format             = "[󰉋 $path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music"     = "󰝚 "
"Pictures"  = " "
"Desktop"   = " "
"Projects"  = " "
"GITHUB"    = " "

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol            = " "
style             = "fg:lavender"
format            = "[$symbol$branch]($style) "
truncation_length = 32
truncation_symbol = "…"

[git_commit]
# Short SHA — useful during rebases, bisects, detached HEAD states
commit_hash_length = 7
style              = "fg:muted"
format             = "[$hash$tag]($style) "
only_detached      = false        # show always, not just detached HEAD
tag_symbol         = " 󰓹 "

[git_state]
style  = "bold fg:peach"
format = '([$state( $progress_current/$progress_total)]($style) )'

[git_status]
style     = "fg:amber"
format    = "([$all_status$ahead_behind]($style) )"
ahead     = "⇡${count} "
behind    = "⇣${count} "
diverged  = "⇕⇡${ahead_count}⇣${behind_count} "
conflicted = "~${count} "
untracked = "?${count} "
modified  = "!${count} "
staged    = "+${count} "
renamed   = "»${count} "
deleted   = "✘${count} "
stashed   = "*${count} "
up_to_date = ""

# ── Timing & clock ────────────────────────────────────────────────────────────
[cmd_duration]
min_time         = 750
show_milliseconds = false
style            = "fg:muted"
format           = "[󱎫 $duration]($style) "

[time]
disabled    = false
time_format = "%I:%M %p"
style       = "fg:teal"
format      = "[󰥔 $time]($style)"

# ── Runtimes (right_format) ───────────────────────────────────────────────────
[python]
symbol  = " "
style   = "fg:green"
format  = '[${symbol}${pyenv_prefix}${version}( \($virtualenv\))]($style) '

[nodejs]
symbol = " "
style  = "fg:green"
format = "[$symbol$version]($style) "

[golang]
symbol = " "
style  = "fg:green"
format = "[$symbol$version]($style) "

[rust]
symbol = " "
style  = "fg:green"
format = "[$symbol$version]($style) "

[java]
# Scoped to real Java projects so `java -version` doesn't run on every prompt.
symbol          = " "
style           = "fg:green"
format          = "[$symbol$version]($style) "
disabled        = false
detect_extensions = ["java", "class", "jar", "gradle", "clj", "cljc"]
detect_files    = ["pom.xml", "build.gradle", "build.gradle.kts", "deps.edn", "project.clj", ".java-version", "build.sbt"]

[lua]
symbol = " "
style  = "fg:blue"
format = "[$symbol$version]($style) "

[ruby]
symbol   = " "
style    = "fg:green"
format   = "[$symbol$version]($style) "
disabled = false

[package]
symbol = "󰏗 "
style  = "fg:amber"
format = "[$symbol$version]($style) "

# ── Containers & orchestration ────────────────────────────────────────────────
[docker_context]
symbol = " "
style  = "fg:blue"
format = "[${symbol}${context}]($style) "

[kubernetes]
symbol   = "󱃾 "
style    = "fg:teal"
format   = '[${symbol}${context}( \($namespace\))]($style) '
disabled = true

[terraform]
symbol   = "󱁢 "
style    = "fg:lavender"
format   = "[$symbol$workspace]($style) "
disabled = true

# ── Cloud profiles ────────────────────────────────────────────────────────────
[aws]
symbol   = "󰸏 "
style    = "fg:amber"
format   = '[$symbol($profile)(\($region\))]($style) '
disabled = true

[gcloud]
symbol   = "󰊭 "
style    = "fg:blue"
format   = "[$symbol$account(@$domain)($region)]($style) "
disabled = true

# ── Shell state ───────────────────────────────────────────────────────────────
[jobs]
symbol            = "✦ "
number_threshold  = 1
style             = "fg:muted"
format            = "[$symbol$number]($style) "

[status]
disabled = false
symbol   = "✘ "
style    = "bold fg:red"
format   = "[$symbol$status]($style) "

# ── Environment ───────────────────────────────────────────────────────────────
[direnv]
disabled = false
symbol   = "󰇙 "
style    = "fg:amber"
format   = "[$symbol$loaded/$allowed]($style) "

[os]
disabled = false
style    = "fg:muted"
format   = "[$symbol]($style) "
[os.symbols]
Macos   = " "
Linux   = " "
Arch    = " "
Ubuntu  = " "
Debian  = " "
Fedora  = " "

[battery]
full_symbol        = "󰁹 "
charging_symbol    = "󰂄 "
discharging_symbol = "󰂃 "
unknown_symbol     = "󰂑 "
empty_symbol       = "󰂎 "
format             = "[$symbol$percentage]($style) "
[[battery.display]]
threshold          = 20
style              = "bold fg:red"
[[battery.display]]
threshold          = 50
style              = "fg:amber"
discharging_symbol = "󰁾 "

[character]
success_symbol            = "[❯](bold fg:green)"
error_symbol              = "[❯](bold fg:red)"
vimcmd_symbol             = "[❮](bold fg:amber)"
vimcmd_replace_one_symbol = "[❮](bold fg:peach)"
vimcmd_replace_symbol     = "[❮](bold fg:peach)"
vimcmd_visual_symbol      = "[❮](bold fg:lavender)"