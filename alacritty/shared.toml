# Alacritty — shared, portable settings.
# Imported by macos.toml and linux.toml. Don't put OS-specific keys here.

[env]
TERM = "xterm-256color"

[terminal]
osc52 = "CopyPaste"

[font]
normal = { family = "CaskaydiaMono Nerd Font Mono", style = "Regular" }
bold   = { family = "CaskaydiaMono Nerd Font Mono", style = "Bold" }
italic = { family = "CaskaydiaMono Nerd Font Mono", style = "Italic" }

[window]
padding = { x = 14, y = 14 }

[scrolling]
history = 100000

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[keyboard]
bindings = [
  { key = "Insert", mods = "Shift",   action = "Paste" },
  { key = "Insert", mods = "Control", action = "Copy" },
  { key = "Return", mods = "Shift",   chars  = "\u001B\r" },
]
