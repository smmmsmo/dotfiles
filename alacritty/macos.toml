# Alacritty — macOS overlay (Catppuccin Macchiato).
# This file becomes ~/.config/alacritty/alacritty.toml via bootstrap.sh.
#
# To enable the Catppuccin theme on a macOS machine, fetch the palette once:
#   mkdir -p ~/.config/alacritty/themes
#   curl -L -o ~/.config/alacritty/themes/catppuccin-macchiato.toml \
#     https://raw.githubusercontent.com/catppuccin/alacritty/main/catppuccin-macchiato.toml
# The import below is `?`-prefixed so it's optional — Alacritty will
# render with default colors if the theme file isn't present.

[general]
import = [
  "~/GITHUB/dotfiles/alacritty/shared.toml",
  "~/.config/alacritty/themes/catppuccin-macchiato.toml",
]

[font]
size = 14

[window]
decorations  = "Buttonless"
option_as_alt = "Both"
opacity       = 0.96
blur          = true
